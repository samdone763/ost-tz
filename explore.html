<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gundua — OST</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--ink:#0A0A0A;--accent:#E8621A;--accent2:#FF8C42;--border:rgba(255,255,255,0.1);--surface:rgba(255,255,255,0.06);--white:#fff;--fd:'Syne',sans-serif;--fb:'Instrument Sans',sans-serif}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--fb);background:var(--ink);color:var(--white);min-height:100vh;-webkit-font-smoothing:antialiased;padding-bottom:80px}
a{text-decoration:none;color:inherit}
button{cursor:pointer;border:none;font-family:inherit;color:inherit}
/* Header */
.header{padding:16px 16px 0;position:sticky;top:0;background:rgba(10,10,10,0.96);backdrop-filter:blur(12px);z-index:100;padding-bottom:12px}
.header-top{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.back-btn{width:36px;height:36px;border-radius:10px;background:var(--surface);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.search-box{flex:1;display:flex;align-items:center;gap:10px;background:var(--surface);border:1.5px solid var(--border);border-radius:14px;padding:10px 14px;transition:all .2s}
.search-box:focus-within{border-color:var(--accent2);background:rgba(255,255,255,0.08)}
.search-box input{border:none;background:none;outline:none;font-size:.9rem;font-family:var(--fb);color:var(--white);width:100%}
.search-box input::placeholder{color:rgba(255,255,255,0.25)}
.search-clear{color:rgba(255,255,255,0.3);cursor:pointer;font-size:.8rem;white-space:nowrap}
/* Category chips */
.cats{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
.cats::-webkit-scrollbar{display:none}
.cat-chip{display:flex;align-items:center;gap:6px;padding:7px 14px;background:var(--surface);border:1.5px solid var(--border);border-radius:20px;font-size:.78rem;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .2s;flex-shrink:0}
.cat-chip.active{background:var(--accent);border-color:var(--accent);color:white}
.cat-chip:hover:not(.active){border-color:rgba(255,255,255,0.3)}
/* Content */
.content{padding:16px}
/* Section header */
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.sec-title{font-family:var(--fd);font-size:.95rem;font-weight:700}
.sec-link{font-size:.75rem;color:var(--accent2);font-weight:600}
/* Stores horizontal scroll */
.stores-scroll{display:flex;gap:12px;overflow-x:auto;scrollbar-width:none;margin:-4px -16px;padding:4px 16px}
.stores-scroll::-webkit-scrollbar{display:none}
.store-card{flex-shrink:0;width:160px;background:var(--surface);border-radius:14px;border:1px solid var(--border);overflow:hidden;cursor:pointer;transition:all .2s}
.store-card:hover{border-color:rgba(255,255,255,0.3)}
.sc-banner{height:70px;background:linear-gradient(135deg,rgba(232,98,26,0.3),rgba(255,140,66,0.2));position:relative;overflow:hidden}
.sc-banner img{width:100%;height:100%;object-fit:cover}
.sc-logo{width:36px;height:36px;border-radius:8px;border:2px solid rgba(10,10,10,0.8);background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:.85rem;font-weight:800;position:absolute;bottom:-14px;left:10px;overflow:hidden}
.sc-logo img{width:100%;height:100%;object-fit:cover}
.sc-body{padding:18px 10px 10px}
.sc-name{font-size:.8rem;font-weight:700;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sc-cat{font-size:.68rem;color:rgba(255,255,255,0.4)}
.sc-stats{display:flex;gap:8px;margin-top:6px}
.sc-stat{font-size:.65rem;color:rgba(255,255,255,0.4)}
.sc-stat strong{color:rgba(255,255,255,0.7)}
/* Products grid */
.prods-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.prod-card{background:var(--surface);border-radius:14px;border:1px solid var(--border);overflow:hidden;cursor:pointer;transition:all .2s}
.prod-card:hover{border-color:rgba(255,255,255,0.25);transform:translateY(-2px)}
.pc-img{aspect-ratio:1;overflow:hidden;background:rgba(255,255,255,0.04);position:relative}
.pc-img img{width:100%;height:100%;object-fit:cover;transition:transform .3s}
.prod-card:hover .pc-img img{transform:scale(1.04)}
.pc-badge{position:absolute;top:7px;left:7px;background:var(--accent);color:white;font-size:.6rem;font-weight:800;padding:2px 7px;border-radius:20px}
.pc-body{padding:10px}
.pc-store{font-size:.65rem;color:rgba(255,255,255,0.35);margin-bottom:2px}
.pc-name{font-size:.82rem;font-weight:600;margin-bottom:5px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;line-height:1.4}
.pc-price{font-family:var(--fd);font-size:.95rem;font-weight:800}
.pc-orig{font-size:.72rem;color:rgba(255,255,255,0.35);text-decoration:line-through;font-weight:400;margin-left:4px}
/* Search results */
.search-results{margin-top:0}
.result-section{margin-bottom:24px}
.no-results{text-align:center;padding:50px 20px;color:rgba(255,255,255,0.3)}
.no-results .icon{font-size:3rem;margin-bottom:12px}
.no-results h3{font-family:var(--fd);font-size:1rem;margin-bottom:6px;color:rgba(255,255,255,0.6)}
/* Skeleton */
.sk{background:linear-gradient(90deg,rgba(255,255,255,.05) 25%,rgba(255,255,255,.1) 50%,rgba(255,255,255,.05) 75%);background-size:200% 100%;animation:sk 1.5s infinite;border-radius:8px}
@keyframes sk{0%{background-position:200% 0}100%{background-position:-200% 0}}
/* Bottom nav */
.bnav{position:fixed;bottom:0;left:0;right:0;height:64px;background:rgba(10,10,10,0.92);backdrop-filter:blur(20px);border-top:1px solid rgba(255,255,255,0.07);display:flex;align-items:center;justify-content:space-around;z-index:200}
.bi{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;padding:6px 14px}
.bi-lbl{font-size:.58rem;font-weight:600;color:rgba(255,255,255,0.4)}
.bi.active .bi-lbl{color:var(--accent2)}
.bnav-post{width:44px;height:44px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:13px;display:flex;align-items:center;justify-content:center;cursor:pointer}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <button class="back-btn" onclick="location.href='index.html'">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <div class="search-box">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="searchInput" placeholder="Tafuta bidhaa au biashara..." autofocus oninput="onSearch(this.value)">
      <span class="search-clear" id="clearBtn" onclick="clearSearch()" style="display:none">✕ Futa</span>
    </div>
  </div>

  <!-- Categories -->
  <div class="cats" id="catsBar">
    <div class="cat-chip active" data-cat="" onclick="setCat('',this)">🏪 Zote</div>
    <div class="cat-chip" data-cat="fashion" onclick="setCat('fashion',this)">👗 Nguo</div>
    <div class="cat-chip" data-cat="electronics" onclick="setCat('electronics',this)">📱 Elektroniki</div>
    <div class="cat-chip" data-cat="food" onclick="setCat('food',this)">🍽️ Chakula</div>
    <div class="cat-chip" data-cat="beauty" onclick="setCat('beauty',this)">💄 Urembo</div>
    <div class="cat-chip" data-cat="health" onclick="setCat('health',this)">💊 Afya</div>
    <div class="cat-chip" data-cat="agriculture" onclick="setCat('agriculture',this)">🌾 Kilimo</div>
    <div class="cat-chip" data-cat="home" onclick="setCat('home',this)">🏠 Nyumba</div>
    <div class="cat-chip" data-cat="automotive" onclick="setCat('automotive',this)">🚗 Magari</div>
    <div class="cat-chip" data-cat="art" onclick="setCat('art',this)">🎨 Sanaa</div>
    <div class="cat-chip" data-cat="services" onclick="setCat('services',this)">🔧 Huduma</div>
  </div>
</div>

<div class="content">
  <!-- Default view: Discover -->
  <div id="discoverView">
    <!-- Featured Stores -->
    <div class="sec-head"><div class="sec-title">🏪 Biashara Maarufu</div></div>
    <div class="stores-scroll" id="storesScroll">
      ${Array(5).fill('<div class="store-card"><div class="sk" style="height:70px"></div><div style="padding:18px 10px 10px"><div class="sk" style="height:14px;width:80%;margin-bottom:6px"></div><div class="sk" style="height:10px;width:50%"></div></div></div>').join('')}
    </div>

    <!-- Trending Products -->
    <div class="sec-head" style="margin-top:24px"><div class="sec-title">🔥 Bidhaa Trending</div></div>
    <div class="prods-grid" id="trendingGrid">
      ${Array(6).fill('<div class="prod-card"><div class="sk" style="aspect-ratio:1"></div><div style="padding:10px"><div class="sk" style="height:12px;width:60%;margin-bottom:6px"></div><div class="sk" style="height:16px;width:40%"></div></div></div>').join('')}
    </div>
  </div>

  <!-- Search results -->
  <div id="searchView" style="display:none">
    <div id="searchResults"></div>
  </div>
</div>

<!-- Bottom Nav -->
<nav class="bnav">
  <div class="bi" onclick="location.href='index.html'">
    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>
    <span class="bi-lbl">Nyumbani</span>
  </div>
  <div class="bi active">
    <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8" fill="none" stroke="currentColor" stroke-width="2"/><line x1="21" y1="21" x2="16.65" y2="16.65" stroke="currentColor" stroke-width="2"/></svg>
    <span class="bi-lbl" style="color:var(--accent2)">Gundua</span>
  </div>
  <div class="bnav-post" onclick="goPost()">
    <svg width="20" height="20" fill="none" stroke="white" stroke-width="2.5" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
  </div>
  <div class="bi" onclick="location.href='track.html'">
    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/></svg>
    <span class="bi-lbl">Oda</span>
  </div>
  <div class="bi" onclick="location.href='profile.html'">
    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    <span class="bi-lbl">Mimi</span>
  </div>
</nav>

<script>
const API='https://ost-tz.onrender.com/api';
let currentCat='',searchTimer=null;
const fmt=n=>new Intl.NumberFormat('sw-TZ',{style:'currency',currency:'TZS',minimumFractionDigits:0}).format(n||0);
const phs=['https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=400&q=80','https://images.unsplash.com/photo-1585386959984-a4155224a1ad?w=400&q=80','https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=400&q=80','https://images.unsplash.com/photo-1560472354-b33ff0c44a43?w=400&q=80','https://images.unsplash.com/photo-1484723091739-30a097e8f929?w=400&q=80','https://images.unsplash.com/photo-1491553895911-0055eca6402d?w=400&q=80'];

async function loadDiscover(){
  try{
    const[storesD,prodsD]=await Promise.all([
      fetch(`${API}/stores?limit=10`).then(r=>r.json()),
      fetch(`${API}/products?sort=popular&limit=12${currentCat?'&category='+currentCat:''}`).then(r=>r.json())
    ]);

    // Stores
    const stores=storesD.stores||[];
    document.getElementById('storesScroll').innerHTML=stores.length?stores.map(s=>`
      <div class="store-card" onclick="location.href='store.html?id=${s._id}'">
        <div class="sc-banner" style="${s.banner?.url?`background-image:url(${s.banner.url});background-size:cover`:''}">
          <div class="sc-logo">${s.logo?.url?`<img src="${s.logo.url}" alt="">`:(s.name?.[0]?.toUpperCase()||'S')}</div>
        </div>
        <div class="sc-body">
          <div class="sc-name">${s.name}</div>
          <div class="sc-cat">${s.category||''} • ${s.location?.region||''}</div>
          <div class="sc-stats"><span class="sc-stat"><strong>${s.stats?.totalProducts||0}</strong> bidhaa</span></div>
        </div>
      </div>`).join(''):'<div style="color:rgba(255,255,255,0.3);font-size:.8rem;padding:20px">Bado hakuna biashara</div>';

    // Products
    renderProds(prodsD.products||[]);
  }catch(e){}
}

function renderProds(prods){
  document.getElementById('trendingGrid').innerHTML=prods.length?prods.map((p,i)=>`
    <div class="prod-card" onclick="location.href='product.html?id=${p._id}'">
      <div class="pc-img">
        <img src="${p.media?.[0]?.url||phs[i%phs.length]}" loading="lazy" onerror="this.src='${phs[0]}'">
        ${p.isOnSale?'<span class="pc-badge">SALE</span>':''}
      </div>
      <div class="pc-body">
        <div class="pc-store">${p.store?.name||''}</div>
        <div class="pc-name">${p.name}</div>
        <div><span class="pc-price">${fmt(p.price?.discounted||p.price?.original)}</span>${p.price?.discounted?`<span class="pc-orig">${fmt(p.price.original)}</span>`:''}</div>
      </div>
    </div>`).join(''):'<div style="grid-column:1/-1;text-align:center;padding:30px;color:rgba(255,255,255,0.3);font-size:.82rem">Hakuna bidhaa</div>';
}

function onSearch(q){
  clearTimeout(searchTimer);
  document.getElementById('clearBtn').style.display=q?'inline':'none';
  if(!q){showDiscover();return;}
  showSearchView();
  searchTimer=setTimeout(()=>doSearch(q),350);
}

async function doSearch(q){
  document.getElementById('searchResults').innerHTML=`<div style="display:grid;grid-template-columns:repeat(2,1fr);gap:10px">${Array(4).fill('<div class="prod-card"><div class="sk" style="aspect-ratio:1"></div><div style="padding:10px"><div class="sk" style="height:12px;margin-bottom:6px"></div><div class="sk" style="height:16px;width:50%"></div></div></div>').join('')}</div>`;
  try{
    const data=await fetch(`${API}/search?q=${encodeURIComponent(q)}${currentCat?'&category='+currentCat:''}`).then(r=>r.json());
    const prods=data.results?.products||[];
    const stores=data.results?.stores||[];

    if(!prods.length&&!stores.length){
      document.getElementById('searchResults').innerHTML=`<div class="no-results"><div class="icon">🔍</div><h3>Hakuna matokeo</h3><p>Jaribu maneno mengine</p></div>`;
      return;
    }

    let html='';
    if(stores.length){html+=`<div class="result-section"><div class="sec-head"><div class="sec-title">🏪 Biashara (${stores.length})</div></div><div class="stores-scroll">${stores.map(s=>`<div class="store-card" onclick="location.href='store.html?id=${s._id}'"><div class="sc-banner" style="${s.banner?.url?`background-image:url(${s.banner.url});background-size:cover`:''}"><div class="sc-logo">${s.name?.[0]?.toUpperCase()||'S'}</div></div><div class="sc-body"><div class="sc-name">${s.name}</div><div class="sc-cat">${s.category||''}</div></div></div>`).join('')}</div></div>`;}
    if(prods.length){html+=`<div class="result-section"><div class="sec-head"><div class="sec-title">📦 Bidhaa (${prods.length})</div></div><div class="prods-grid">${prods.map((p,i)=>`<div class="prod-card" onclick="location.href='product.html?id=${p._id}'"><div class="pc-img"><img src="${p.media?.[0]?.url||phs[i%phs.length]}" loading="lazy"></div><div class="pc-body"><div class="pc-store">${p.store?.name||''}</div><div class="pc-name">${p.name}</div><div><span class="pc-price">${fmt(p.price?.discounted||p.price?.original)}</span></div></div></div>`).join('')}</div></div>`;}
    document.getElementById('searchResults').innerHTML=html;
  }catch(e){document.getElementById('searchResults').innerHTML=`<div class="no-results"><div class="icon">⚠️</div><h3>Hitilafu ya mtandao</h3></div>`;}
}

function setCat(cat,btn){
  currentCat=cat;
  document.querySelectorAll('.cat-chip').forEach(c=>c.classList.remove('active'));
  btn.classList.add('active');
  const q=document.getElementById('searchInput').value;
  if(q)doSearch(q);else loadDiscover();
}

function clearSearch(){document.getElementById('searchInput').value='';document.getElementById('clearBtn').style.display='none';showDiscover();}
function showDiscover(){document.getElementById('discoverView').style.display='block';document.getElementById('searchView').style.display='none';}
function showSearchView(){document.getElementById('discoverView').style.display='none';document.getElementById('searchView').style.display='block';}
function goPost(){const u=JSON.parse(localStorage.getItem('ost_user')||'null');if(!u)location.href='index.html';else if(u.role==='merchant')location.href='admin/products.html?new=1';else alert('Unahitaji akaunti ya muuzaji');}

// Check URL params
const urlQ=new URLSearchParams(location.search).get('q');
if(urlQ){document.getElementById('searchInput').value=urlQ;onSearch(urlQ);}
else loadDiscover();
</script>
</body>
</html>
