<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fuatilia Oda — Online Stores TZ</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--primary:#0A0A0A;--accent:#E8621A;--accent-soft:#FFF3ED;--success:#16A34A;--success-soft:#DCFCE7;--warning:#D97706;--warning-soft:#FEF3C7;--danger:#DC2626;--danger-soft:#FEE2E2;--info:#2563EB;--info-soft:#DBEAFE;--border:#E5E7EB;--bg:#F9FAFB;--t1:#111827;--t2:#4B5563;--t3:#9CA3AF;--font:'Plus Jakarta Sans',system-ui,sans-serif;--r:14px;--nav:60px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);color:var(--t1);background:var(--bg);-webkit-font-smoothing:antialiased;font-size:15px}
a{text-decoration:none;color:inherit}
.navbar{height:var(--nav);background:#fff;border-bottom:1px solid var(--border);display:flex;align-items:center;position:sticky;top:0;z-index:100}
.navbar .inner{max-width:800px;margin:0 auto;padding:0 20px;display:flex;align-items:center;justify-content:space-between;width:100%}
.nav-logo{font-size:1.1rem;font-weight:800;letter-spacing:-.02em}
.nav-logo span{color:var(--accent)}
/* Search */
.search-section{background:#fff;border-bottom:1px solid var(--border);padding:24px 20px}
.search-inner{max-width:500px;margin:0 auto;text-align:center}
.search-title{font-size:1.2rem;font-weight:800;margin-bottom:4px}
.search-sub{font-size:.83rem;color:var(--t3);margin-bottom:16px}
.search-box{display:flex;gap:0;border:2px solid var(--border);border-radius:12px;overflow:hidden;transition:all .15s;background:#fff}
.search-box:focus-within{border-color:var(--primary)}
.search-box input{flex:1;border:none;outline:none;padding:12px 16px;font-size:.9rem;font-family:var(--font);color:var(--t1)}
.search-box input::placeholder{color:var(--t3)}
.search-box button{background:var(--primary);color:#fff;border:none;padding:12px 20px;font-size:.85rem;font-weight:700;cursor:pointer;font-family:var(--font);transition:all .15s;white-space:nowrap}
.search-box button:hover{background:#1F2937}
/* Content */
.content{max-width:700px;margin:0 auto;padding:28px 20px}
/* Order Card */
.order-card{background:#fff;border-radius:var(--r);border:1px solid var(--border);overflow:hidden;margin-bottom:16px;animation:fadeUp .3s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.order-card-head{padding:18px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.order-number{font-size:1.1rem;font-weight:800;letter-spacing:.02em}
.order-date{font-size:.78rem;color:var(--t3)}
.order-card-body{padding:20px}
/* Status Hero */
.status-hero{text-align:center;padding:24px 20px;background:linear-gradient(135deg,var(--primary),#1F2937);border-radius:12px;margin-bottom:20px;color:#fff}
.status-emoji{font-size:3rem;margin-bottom:8px;display:block}
.status-title{font-size:1.1rem;font-weight:800;margin-bottom:4px}
.status-message{font-size:.83rem;opacity:.7}
/* Progress Bar */
.progress-section{margin-bottom:20px}
.progress-steps{display:flex;align-items:center;position:relative}
.progress-step{flex:1;text-align:center;position:relative;z-index:1}
.progress-dot{width:32px;height:32px;border-radius:50%;border:2px solid var(--border);background:#fff;display:flex;align-items:center;justify-content:center;margin:0 auto 6px;font-size:.8rem;transition:all .3s}
.progress-step.done .progress-dot{background:var(--success);border-color:var(--success);color:#fff}
.progress-step.active .progress-dot{background:var(--accent);border-color:var(--accent);color:#fff;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(232,98,26,.4)}50%{box-shadow:0 0 0 8px rgba(232,98,26,0)}}
.progress-step.cancelled .progress-dot{background:var(--danger);border-color:var(--danger);color:#fff}
.progress-label{font-size:.68rem;font-weight:600;color:var(--t3);white-space:nowrap}
.progress-step.done .progress-label{color:var(--success)}
.progress-step.active .progress-label{color:var(--accent);font-weight:700}
.progress-line{position:absolute;top:15px;left:0;right:0;height:2px;background:var(--border);z-index:0}
.progress-fill{height:100%;background:var(--success);transition:width .5s ease}
/* Timeline */
.timeline{display:flex;flex-direction:column}
.timeline-item{display:flex;gap:14px;padding-bottom:18px;position:relative}
.timeline-item::before{content:'';position:absolute;left:15px;top:30px;bottom:0;width:2px;background:var(--border)}
.timeline-item.done::before{background:var(--success)}
.timeline-item:last-child::before{display:none}
.t-dot{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;z-index:1;font-size:.8rem;border:2px solid var(--border);background:#fff}
.timeline-item.done .t-dot{background:var(--success);border-color:var(--success);color:#fff}
.timeline-item.current .t-dot{background:var(--accent);border-color:var(--accent);color:#fff}
.t-content{flex:1;padding-top:4px}
.t-status{font-weight:700;font-size:.85rem;color:var(--t1)}
.t-message{font-size:.8rem;color:var(--t2);margin-top:2px}
.t-location{font-size:.75rem;color:var(--t3);margin-top:2px;display:flex;align-items:center;gap:4px}
.t-time{font-size:.73rem;color:var(--t3);margin-top:4px}
/* Order Items */
.items-list{display:flex;flex-direction:column;gap:10px}
.item-row{display:flex;align-items:center;gap:12px;padding:10px;background:var(--bg);border-radius:10px}
.item-img{width:48px;height:48px;border-radius:8px;object-fit:cover;background:#fff;border:1px solid var(--border);flex-shrink:0}
.item-name{font-weight:600;font-size:.83rem;flex:1}
.item-qty{font-size:.75rem;color:var(--t3)}
.item-price{font-weight:700;font-size:.83rem;white-space:nowrap}
/* Pricing */
.pricing-card{background:var(--bg);border-radius:10px;padding:14px}
.price-row{display:flex;justify-content:space-between;font-size:.83rem;padding:4px 0}
.price-row.total{font-size:.95rem;font-weight:800;border-top:1px solid var(--border);margin-top:6px;padding-top:10px}
/* Contact Store */
.contact-card{background:var(--bg);border-radius:10px;padding:14px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.contact-info .store-name{font-weight:700;font-size:.88rem}
.contact-info .store-cat{font-size:.75rem;color:var(--t3)}
.contact-btns{display:flex;gap:8px}
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 14px;border-radius:9px;font-size:.78rem;font-weight:700;cursor:pointer;transition:all .15s;border:none;font-family:var(--font)}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:#1F2937}
.btn-outline{background:#fff;color:var(--t1);border:1.5px solid var(--border)}
.btn-green{background:#25D366;color:#fff}
/* Badge */
.badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;font-size:.72rem;font-weight:700}
.badge::before{content:'';width:5px;height:5px;border-radius:50%;background:currentColor}
.b-success{background:var(--success-soft);color:var(--success)}
.b-warning{background:var(--warning-soft);color:var(--warning)}
.b-info{background:var(--info-soft);color:var(--info)}
.b-accent{background:var(--accent-soft);color:var(--accent)}
.b-danger{background:var(--danger-soft);color:var(--danger)}
.b-gray{background:var(--bg);color:var(--t3)}
/* Section title */
.sec-title{font-size:.72rem;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--t3);margin-bottom:12px}
.section-block{margin-bottom:20px}
/* Skeleton */
.sk{background:linear-gradient(90deg,#f0f2f5 25%,#e8eaed 50%,#f0f2f5 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:8px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
/* Empty */
.empty-state{text-align:center;padding:40px 20px;background:#fff;border-radius:var(--r);border:1px solid var(--border)}
/* Toast */
.toast-container{position:fixed;bottom:24px;right:24px;z-index:500;display:flex;flex-direction:column;gap:10px}
.toast{display:flex;align-items:center;gap:10px;padding:12px 16px;background:#fff;border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,.12);min-width:260px;font-size:.83rem;font-weight:500}
@media(max-width:640px){.progress-label{display:none}.order-card-head{flex-direction:column;align-items:flex-start}.contact-card{flex-direction:column;align-items:flex-start}}
</style>
</head>
<body>

<nav class="navbar">
  <div class="inner">
    <a href="index.html" style="display:flex;align-items:center;gap:6px;font-size:.85rem;font-weight:600;color:var(--t2)">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      Nyumbani
    </a>
    <a href="index.html" class="nav-logo">Online<span>Stores</span> TZ</a>
    <div style="width:80px"></div>
  </div>
</nav>

<div class="search-section">
  <div class="search-inner">
    <div class="search-title">📦 Fuatilia Oda Yako</div>
    <div class="search-sub">Weka namba ya oda kupata habari za sasa hivi</div>
    <div class="search-box">
      <input type="text" id="orderInput" placeholder="Mfano: OST2504XXXX" maxlength="20">
      <button onclick="trackOrder()">Tafuta</button>
    </div>
  </div>
</div>

<div class="content" id="content">
  <!-- Content renders here -->
  <div id="resultArea"></div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script>
const API = 'https://ost-tz.onrender.com/api';

function fmt(n) { return new Intl.NumberFormat('sw-TZ', { style:'currency', currency:'TZS', minimumFractionDigits:0 }).format(n || 0); }
function fmtDate(d) { return new Date(d).toLocaleDateString('sw-TZ', { day:'numeric', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' }); }

function toast(msg, type = 'info') {
  const el = document.createElement('div');
  el.className = 'toast';
  el.innerHTML = `<span>${type==='error'?'❌':'ℹ️'}</span>${msg}`;
  document.getElementById('toastContainer').appendChild(el);
  setTimeout(() => el.remove(), 4000);
}

const statusConfig = {
  pending:          { emoji:'⏳', title:'Inasubiri', message:'Oda imepokelewa. Tunasubiri uthibitisho wa muuzaji.', badge:'b-warning' },
  confirmed:        { emoji:'✅', title:'Imekubaliwa', message:'Muuzaji amekubali oda yako. Inatayarishwa.', badge:'b-info' },
  processing:       { emoji:'📦', title:'Inafungashwa', message:'Bidhaa yako inafungashwa kwa uangalifu.', badge:'b-info' },
  shipped:          { emoji:'🚚', title:'Imesafirishwa', message:'Bidhaa iko njiani kwako!', badge:'b-info' },
  out_for_delivery: { emoji:'🏍️', title:'Iko Karibu Nawe!', message:'Mtu wa delivery yuko karibu na wewe.', badge:'b-accent' },
  delivered:        { emoji:'🎉', title:'Imefikishwa!', message:'Bidhaa yako imefikishwa. Asante kwa ununuzi!', badge:'b-success' },
  cancelled:        { emoji:'❌', title:'Imefutwa', message:'Oda hii imefutwa.', badge:'b-danger' },
  refunded:         { emoji:'↩️', title:'Imerudishiwa', message:'Pesa imerudishwa.', badge:'b-gray' }
};

const statusOrder = ['pending','confirmed','processing','shipped','out_for_delivery','delivered'];
const statusLabels = { pending:'Imepokelewa', confirmed:'Imekubaliwa', processing:'Inafungashwa', shipped:'Imesafirishwa', out_for_delivery:'Njiani', delivered:'Imefikishwa' };

function getProgressPercent(status) {
  const idx = statusOrder.indexOf(status);
  if (idx < 0) return 0;
  return Math.round((idx / (statusOrder.length - 1)) * 100);
}

async function trackOrder() {
  const num = document.getElementById('orderInput').value.trim().toUpperCase();
  if (!num || num.length < 6) { toast('Weka namba sahihi ya oda', 'error'); return; }

  const area = document.getElementById('resultArea');
  area.innerHTML = `<div class="order-card"><div class="order-card-body"><div class="sk" style="height:80px;border-radius:12px;margin-bottom:16px"></div><div class="sk" style="height:14px;width:60%;margin-bottom:10px"></div><div class="sk" style="height:14px;margin-bottom:10px"></div><div class="sk" style="height:14px;width:80%"></div></div></div>`;

  try {
    const data = await fetch(`${API}/orders/track/${num}`).then(r => r.json());
    if (!data.success) {
      area.innerHTML = `<div class="empty-state"><div style="font-size:2.5rem;margin-bottom:12px">🔍</div><h3 style="font-family:var(--font);font-size:1rem;margin-bottom:6px">Oda haipatikani</h3><p style="font-size:.83rem;color:var(--t3)">Angalia namba ya oda na ujaribu tena</p></div>`;
      return;
    }
    renderOrder(data.order);
  } catch(e) {
    area.innerHTML = `<div class="empty-state"><div style="font-size:2.5rem;margin-bottom:12px">⚠️</div><h3 style="font-family:var(--font);font-size:1rem;margin-bottom:6px">Hitilafu ya mtandao</h3><p style="font-size:.83rem;color:var(--t3)">Angalia intaneti na ujaribu tena</p></div>`;
  }
}

function renderOrder(o) {
  const cfg = statusConfig[o.status] || statusConfig.pending;
  const progressPct = getProgressPercent(o.status);
  const isCancelled = o.status === 'cancelled';

  const progressHTML = !isCancelled ? `
    <div class="progress-section section-block">
      <div class="sec-title">Mwendo wa Oda</div>
      <div class="progress-steps">
        <div class="progress-line"><div class="progress-fill" style="width:${progressPct}%"></div></div>
        ${statusOrder.map(s => {
          const idx = statusOrder.indexOf(s);
          const currentIdx = statusOrder.indexOf(o.status);
          const cls = idx < currentIdx ? 'done' : idx === currentIdx ? 'active' : '';
          const icons = { pending:'📨', confirmed:'✅', processing:'📦', shipped:'🚚', out_for_delivery:'🏍️', delivered:'🎉' };
          return `<div class="progress-step ${cls}">
            <div class="progress-dot">${cls === 'done' ? '✓' : icons[s]}</div>
            <div class="progress-label">${statusLabels[s]}</div>
          </div>`;
        }).join('')}
      </div>
    </div>` : '';

  document.getElementById('resultArea').innerHTML = `
    <div class="order-card">
      <div class="order-card-head">
        <div>
          <div class="order-number">#${o.orderNumber}</div>
          <div class="order-date">Tarehe: ${fmtDate(o.createdAt)}</div>
        </div>
        <span class="badge ${cfg.badge}">${cfg.title}</span>
      </div>
      <div class="order-card-body">

        <!-- Status Hero -->
        <div class="status-hero" style="${isCancelled ? 'background:linear-gradient(135deg,#7F1D1D,#991B1B)' : ''}">
          <span class="status-emoji">${cfg.emoji}</span>
          <div class="status-title">${cfg.title}</div>
          <div class="status-message">${cfg.message}</div>
        </div>

        ${progressHTML}

        <!-- Timeline -->
        <div class="section-block">
          <div class="sec-title">Historia ya Oda</div>
          <div class="timeline">
            ${(o.tracking || []).map((t, i, arr) => {
              const isLast = i === arr.length - 1;
              const isDone = !isLast;
              return `<div class="timeline-item ${isDone ? 'done' : 'current'}">
                <div class="t-dot">${isDone ? '✓' : '●'}</div>
                <div class="t-content">
                  <div class="t-status">${statusLabels[t.status] || t.status}</div>
                  <div class="t-message">${t.message || ''}</div>
                  ${t.location ? `<div class="t-location">📍 ${t.location}</div>` : ''}
                  <div class="t-time">🕐 ${fmtDate(t.timestamp)}</div>
                </div>
              </div>`;
            }).join('')}
          </div>
        </div>

        <!-- Items -->
        <div class="section-block">
          <div class="sec-title">Bidhaa Zilizoagizwa</div>
          <div class="items-list">
            ${(o.items || []).map(item => `
              <div class="item-row">
                <img class="item-img" src="${item.image || 'assets/icons/product.svg'}" onerror="this.src='assets/icons/product.svg'">
                <div class="item-name">
                  ${item.name}
                  <div class="item-qty">Idadi: ${item.quantity}</div>
                </div>
                <div class="item-price">${fmt(item.subtotal)}</div>
              </div>`).join('')}
          </div>
        </div>

        <!-- Pricing -->
        <div class="section-block">
          <div class="sec-title">Muhtasari wa Bei</div>
          <div class="pricing-card">
            <div class="price-row"><span>Bidhaa</span><span>${fmt(o.pricing?.subtotal)}</span></div>
            <div class="price-row"><span>Delivery</span><span>${fmt(o.pricing?.deliveryFee)}</span></div>
            <div class="price-row total"><span>JUMLA</span><span>${fmt(o.pricing?.total)}</span></div>
          </div>
        </div>

        <!-- Delivery Info -->
        <div class="section-block">
          <div class="sec-title">Maelezo ya Delivery</div>
          <div class="pricing-card">
            <div class="price-row"><span>Jina</span><span>${o.customerInfo?.name}</span></div>
            <div class="price-row"><span>Simu</span><span>${o.customerInfo?.phone}</span></div>
            <div class="price-row"><span>Anwani</span><span>${o.customerInfo?.address}, ${o.customerInfo?.region || ''}</span></div>
            <div class="price-row"><span>Malipo</span><span>${o.payment?.method?.replace(/_/g,' ').toUpperCase()}</span></div>
          </div>
        </div>

        <!-- Contact Store -->
        ${o.store ? `
        <div class="section-block">
          <div class="sec-title">Wasiliana na Muuzaji</div>
          <div class="contact-card">
            <div class="contact-info">
              <div class="store-name">🏪 ${o.store.name}</div>
              <div class="store-cat">Bonyeza kuwasiliana moja kwa moja</div>
            </div>
            <div class="contact-btns">
              ${o.store.contact?.whatsapp ? `<a href="https://wa.me/${o.store.contact.whatsapp.replace(/\D/g,'')}" class="btn btn-green" target="_blank">WhatsApp</a>` : ''}
              ${o.store.contact?.phone ? `<a href="tel:${o.store.contact.phone}" class="btn btn-outline">📞 Piga Simu</a>` : ''}
            </div>
          </div>
        </div>` : ''}

      </div>
    </div>

    <!-- Actions -->
    <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:8px">
      <button onclick="trackOrder()" class="btn btn-outline">🔄 Sasisha</button>
      <a href="index.html" class="btn btn-primary">Rudi Kununua</a>
    </div>
  `;
}

// Auto-load from URL param
const orderNum = new URLSearchParams(location.search).get('order');
if (orderNum) {
  document.getElementById('orderInput').value = orderNum;
  trackOrder();
}

// Enter key support
document.getElementById('orderInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') trackOrder();
});
</script>
</body>
</html>
